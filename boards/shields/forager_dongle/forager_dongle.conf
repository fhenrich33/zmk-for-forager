CONFIG_ZMK_KEYBOARD_NAME="forager_dongle"

# USB output to computer
CONFIG_ZMK_USB=y

# Bluetooth radio (needed to talk to halves)
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y

# THIS IS THE IMPORTANT LINE
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Battery proxy (optional but good)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Studio (optional)
CONFIG_ZMK_STUDIO=y
